<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résultat - ProFace AI</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#111827,#1e1b4b);
color:white;
margin:0;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:80px 20px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
color:#cbd5e1;
}

.grid{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:20px;
}

.card img{
width:100%;
border-radius:14px;
}

.blur{
filter:blur(8px);
}

.unlock{
margin-top:50px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
}

.price{
font-size:36px;
margin:20px 0;
font-weight:bold;
}

button{
padding:16px 28px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
background:linear-gradient(90deg,#22d3ee,#e879f9,#8b5cf6);
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Voici ton résultat</h1>
<p>Ton portrait LinkedIn généré par IA</p>

<div class="grid">

<div class="card">
<img class="blur" src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39">
</div>

<div class="card">
<img class="blur" src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39">
</div>

<div class="card">
<img class="blur" src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39">
</div>

<div class="card">
<img class="blur" src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39">
</div>

</div>

<div class="unlock">

<h2>Débloque tes photos HD</h2>

<p>Photos LinkedIn professionnelles générées par IA</p>

<div class="price">9€</div>

<button>Débloquer mes photos</button>

</div>

</div>

</body>
</html>
